<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#10B981" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310B981'/><text y='.9em' font-size='75' x='12'>🚌</text></svg>"/>
    <meta name="description" content="Glogo — Ghana's smartest transit platform. Join your trotro queue from home, track it live, pay by MoMo." />
    <title>Glogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #F9FAFB;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #111827;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #F3F4F6; }
      ::-webkit-scrollbar-thumb { background: #D1FAE5; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #10B981; }
      input:focus, textarea:focus, select:focus {
        border-color: #10B981 !important;
        box-shadow: 0 0 0 3px rgba(16,185,129,0.12) !important;
        outline: none !important;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript to run Glogo.</noscript>
    <div id="root"></div>
  </body>
</html>
